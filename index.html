<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline Carrossel — @suellenwarmling</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #C84B1A;
    --orange-light: #E05A25;
    --orange-pale: rgba(200,75,26,0.12);
    --black: #0A0A0A;
    --dark: #111111;
    --card: #181818;
    --border: rgba(255,255,255,0.07);
    --cream: #FCE9D9;
    --white: #F5F5F0;
    --muted: rgba(245,245,240,0.45);
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: var(--font-body);
    font-weight: 400;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── NOISE TEXTURE ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  /* ─── LAYOUT ─── */
  .app {
    display: grid;
    grid-template-columns: 300px 1fr;
    min-height: 100vh;
  }

  /* ─── SIDEBAR ─── */
  .sidebar {
    background: var(--dark);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }

  .sidebar-header {
    padding: 36px 28px 28px;
    border-bottom: 1px solid var(--border);
  }

  .brand-tag {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .brand-tag::before {
    content: '';
    width: 20px; height: 1px;
    background: var(--orange);
  }

  .sidebar-title {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    line-height: 1.25;
    color: var(--white);
  }

  .sidebar-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
  }

  /* ─── PHASES NAV ─── */
  .phases-nav {
    padding: 20px 0;
    flex: 1;
  }

  .phase-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 28px;
    cursor: pointer;
    transition: background 0.2s;
    position: relative;
  }
  .phase-item:hover { background: rgba(255,255,255,0.03); }
  .phase-item.active { background: var(--orange-pale); }
  .phase-item.active::left {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: var(--orange);
  }
  .phase-item.completed .phase-num {
    background: var(--orange);
    color: var(--white);
    border-color: var(--orange);
  }
  .phase-item.active .phase-num {
    border-color: var(--orange);
    color: var(--orange);
  }

  .phase-num {
    width: 28px; height: 28px;
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
    margin-top: 1px;
    transition: all 0.2s;
  }

  .phase-info { flex: 1; }
  .phase-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--white);
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  .phase-item.active .phase-name { opacity: 1; }
  .phase-item.completed .phase-name { opacity: 0.9; }
  .phase-desc {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    line-height: 1.4;
  }

  .phase-connector {
    width: 1px;
    height: 12px;
    background: var(--border);
    margin-left: 42px;
  }

  /* ─── SIDEBAR FOOTER ─── */
  .sidebar-footer {
    padding: 20px 28px;
    border-top: 1px solid var(--border);
  }

  .progress-bar {
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 8px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--orange), var(--orange-light));
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }
  .progress-text {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  /* ─── MAIN CONTENT ─── */
  .main {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ─── TOP BAR ─── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 48px;
    border-bottom: 1px solid var(--border);
  }

  .phase-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .phase-badge-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--orange);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .topbar-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn {
    padding: 9px 20px;
    border-radius: 6px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    letter-spacing: 0.01em;
  }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .btn-ghost:hover {
    border-color: rgba(255,255,255,0.15);
    color: var(--white);
  }
  .btn-primary {
    background: var(--orange);
    color: var(--white);
  }
  .btn-primary:hover {
    background: var(--orange-light);
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(200,75,26,0.35);
  }
  .btn-primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* ─── CONTENT AREA ─── */
  .content {
    flex: 1;
    padding: 52px 48px 48px;
    max-width: 820px;
  }

  .phase-header {
    margin-bottom: 44px;
    animation: fadeSlideIn 0.4s ease;
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .phase-eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 14px;
  }

  .phase-title {
    font-family: var(--font-display);
    font-size: 42px;
    font-weight: 900;
    line-height: 1.1;
    color: var(--white);
    margin-bottom: 14px;
  }

  .phase-title em {
    font-style: italic;
    color: var(--cream);
  }

  .phase-subtitle {
    font-size: 15px;
    color: var(--muted);
    max-width: 520px;
    line-height: 1.65;
  }

  /* ─── FORM ELEMENTS ─── */
  .form-group {
    margin-bottom: 28px;
    animation: fadeSlideIn 0.4s ease;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .input, .textarea, .select {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--white);
    font-family: var(--font-body);
    font-size: 14px;
    padding: 14px 18px;
    transition: all 0.2s;
    outline: none;
    -webkit-appearance: none;
  }
  .input:focus, .textarea:focus, .select:focus {
    border-color: var(--orange);
    box-shadow: 0 0 0 3px rgba(200,75,26,0.12);
  }
  .input::placeholder, .textarea::placeholder {
    color: rgba(245,245,240,0.2);
  }
  .textarea {
    resize: vertical;
    min-height: 120px;
    line-height: 1.6;
  }
  .select option { background: var(--dark); }

  /* ─── CHOICE CARDS ─── */
  .choice-grid {
    display: grid;
    gap: 12px;
  }
  .choice-grid.cols-2 { grid-template-columns: 1fr 1fr; }
  .choice-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }

  .choice-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .choice-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--orange-pale);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .choice-card:hover { border-color: rgba(200,75,26,0.35); }
  .choice-card:hover::before { opacity: 1; }
  .choice-card.selected {
    border-color: var(--orange);
    background: var(--orange-pale);
  }
  .choice-card.selected::before { opacity: 1; }

  .choice-check {
    width: 18px; height: 18px;
    border: 1px solid var(--border);
    border-radius: 50%;
    position: absolute;
    top: 16px; right: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    transition: all 0.2s;
  }
  .choice-card.selected .choice-check {
    background: var(--orange);
    border-color: var(--orange);
    color: white;
  }

  .choice-icon { font-size: 22px; margin-bottom: 10px; }
  .choice-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--white);
    margin-bottom: 4px;
  }
  .choice-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }

  /* ─── GENERATED CONTENT ─── */
  .generated-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .generated-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
  }

  .generated-label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--orange);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .generated-label::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--orange);
  }

  .copy-btn {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .copy-btn:hover { color: var(--white); border-color: rgba(255,255,255,0.2); }

  .generated-content {
    padding: 24px;
    font-size: 14px;
    line-height: 1.8;
    color: rgba(245,245,240,0.85);
    white-space: pre-wrap;
    font-family: var(--font-body);
    max-height: 380px;
    overflow-y: auto;
  }

  .generated-content::-webkit-scrollbar { width: 4px; }
  .generated-content::-webkit-scrollbar-track { background: transparent; }
  .generated-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ─── SLIDE PREVIEW ─── */
  .slides-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-top: 8px;
  }

  .slide-preview {
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .slide-preview:hover {
    border-color: var(--orange);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .slide-preview.selected {
    border-color: var(--orange);
    box-shadow: 0 0 0 2px var(--orange);
  }

  .slide-thumb {
    aspect-ratio: 4/5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
    text-align: center;
    font-size: 11px;
    font-weight: 500;
    position: relative;
  }

  .slide-num {
    position: absolute;
    top: 8px; left: 10px;
    font-family: var(--font-mono);
    font-size: 9px;
    opacity: 0.5;
  }

  .slide-type-badge {
    position: absolute;
    top: 8px; right: 8px;
    font-size: 8px;
    font-family: var(--font-mono);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 3px;
    background: rgba(0,0,0,0.3);
    opacity: 0.7;
  }

  /* ─── MODEL CARDS ─── */
  .model-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }

  .model-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.2s;
  }
  .model-card:hover { border-color: rgba(200,75,26,0.4); transform: translateY(-2px); }
  .model-card.selected { border-color: var(--orange); }

  .model-preview {
    height: 140px;
    position: relative;
    overflow: hidden;
  }

  .model-info {
    padding: 16px;
  }
  .model-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--white);
    margin-bottom: 4px;
  }
  .model-slides {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--orange);
    margin-bottom: 6px;
  }
  .model-desc {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.5;
  }

  /* ─── MODEL 1 PREVIEW ─── */
  .m1-preview {
    background: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
    gap: 4px;
  }
  .m1-p1 { font-size: 7px; font-family: serif; color: #1a1a1a; font-weight: 400; }
  .m1-p2 { font-size: 10px; font-family: serif; color: #1a1a1a; font-weight: 700; text-align: center; }
  .m1-p3 { width: 60%; height: 20px; background: #C84B1A; border-radius: 3px; margin-top: 4px; display: flex; align-items: center; justify-content: center; }
  .m1-p3 span { font-size: 6px; color: white; font-weight: 600; }

  /* ─── MODEL 2 PREVIEW ─── */
  .m2-preview {
    position: relative;
    background: linear-gradient(160deg, #1a0a03 0%, #3d1507 50%, #c84b1a55 100%);
    display: flex;
    align-items: flex-end;
    padding: 12px;
  }
  .m2-overlay {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(2px);
    border-radius: 6px;
    padding: 8px 10px;
    width: 100%;
  }
  .m2-text { font-size: 8px; color: white; line-height: 1.4; font-family: 'DM Sans', sans-serif; }
  .m2-text strong { font-weight: 700; }

  /* ─── MODEL 3 PREVIEW ─── */
  .m3-preview {
    background: #f8f8f8;
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 12px;
  }
  .m3-img-slot {
    height: 60px;
    background: linear-gradient(135deg, #e0e0e0, #c8c8c8);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: #999;
  }
  .m3-text-slot {
    font-size: 7px;
    color: #333;
    line-height: 1.5;
  }

  /* ─── CHECKPOINT BANNER ─── */
  .checkpoint {
    background: linear-gradient(135deg, rgba(200,75,26,0.1), rgba(200,75,26,0.05));
    border: 1px solid rgba(200,75,26,0.25);
    border-radius: 12px;
    padding: 24px 28px;
    display: flex;
    gap: 20px;
    align-items: flex-start;
    margin-bottom: 28px;
    animation: fadeSlideIn 0.4s ease;
  }
  .checkpoint-icon {
    font-size: 28px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .checkpoint-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--white);
    margin-bottom: 6px;
  }
  .checkpoint-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
  }

  /* ─── DELIVERY CARD ─── */
  .delivery-card {
    background: var(--card);
    border: 1px solid var(--orange);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 20px;
    animation: fadeSlideIn 0.5s ease;
  }

  .delivery-header {
    background: var(--orange);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .delivery-icon { font-size: 22px; }
  .delivery-title {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 700;
    color: white;
  }
  .delivery-body {
    padding: 24px;
  }

  .canva-link {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    margin-bottom: 16px;
    text-decoration: none;
    transition: all 0.2s;
  }
  .canva-link:hover {
    border-color: var(--orange);
    background: var(--orange-pale);
  }
  .canva-link-icon { font-size: 20px; }
  .canva-link-text { flex: 1; }
  .canva-link-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--white);
    margin-bottom: 2px;
  }
  .canva-link-url {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--orange);
  }
  .canva-link-arrow { color: var(--muted); }

  /* ─── LOADING STATE ─── */
  .loading-dots {
    display: flex;
    gap: 5px;
    align-items: center;
    justify-content: center;
    padding: 12px;
  }
  .loading-dots span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--orange);
    animation: dotPulse 1.4s infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotPulse {
    0%,80%,100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* ─── SLIDE EDITOR CARDS ─── */
  .slide-edit-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .slide-edit-card:focus-within {
    border-color: var(--orange);
  }
  .slide-edit-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.03);
    border-bottom: 1px solid var(--border);
  }
  .slide-edit-num {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--orange);
    background: var(--orange-pale);
    padding: 2px 8px;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .slide-edit-title {
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .slide-edit-textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--white);
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 1.7;
    padding: 14px 16px;
    resize: vertical;
    min-height: 90px;
  }
  .slide-edit-textarea::placeholder { color: var(--muted); }

  /* ─── DIVIDER ─── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 32px 0;
  }

  /* ─── TAG ─── */
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid;
  }
  .tag-orange { color: var(--orange); border-color: rgba(200,75,26,0.35); background: var(--orange-pale); }
  .tag-muted { color: var(--muted); border-color: var(--border); }

  /* ─── STEP INDICATOR (dentro de fase) ─── */
  .step-tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 28px;
    background: var(--card);
    padding: 3px;
    border-radius: 8px;
    width: fit-content;
  }
  .step-tab {
    padding: 7px 18px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--muted);
    background: transparent;
    border: none;
  }
  .step-tab.active {
    background: var(--orange);
    color: white;
  }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { position: static; height: auto; }
    .phase-title { font-size: 30px; }
    .model-grid { grid-template-columns: 1fr 1fr; }
    .slides-grid { grid-template-columns: repeat(2, 1fr); }
    .content { padding: 32px 24px; }
    .topbar { padding: 16px 24px; }
  }

  /* ─── ANIMATIONS ─── */
  .phase-content { animation: fadeSlideIn 0.35s ease; }

  /* ─── SPINNER ─── */
  .spinner {
    width: 48px; height: 48px;
    border: 3px solid rgba(200,75,26,0.2);
    border-top-color: var(--orange);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── GANCHO OPTIONS ─── */
  .gancho-option {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    margin-bottom: 10px;
  }
  .gancho-option:hover { border-color: rgba(200,75,26,0.35); }
  .gancho-option.selected { border-color: var(--orange); background: var(--orange-pale); }

  .gancho-num {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--orange);
    flex-shrink: 0;
    margin-top: 2px;
  }
  .gancho-text {
    font-size: 13px;
    color: var(--white);
    line-height: 1.55;
  }
  .gancho-metric {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--orange);
    margin-top: 4px;
  }

  /* ─── FORMULA BADGE ─── */
  .formula-badge {
    background: var(--orange-pale);
    border: 1px solid rgba(200,75,26,0.25);
    border-radius: 8px;
    padding: 14px 18px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
  }
  .formula-badge strong { color: var(--orange); }
  .formula-icon { font-size: 18px; }

  /* ─── SLIDES PREVIEW GRID (fase 7) ─── */
  .slides-preview-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 24px;
  }
  .slide-preview-card {
    border-radius: 10px;
    padding: 16px;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    position: relative;
  }
  .slide-preview-card.fundo-branco { background: #FFFFFF; color: #1a1a1a; border: 1px solid #e0e0e0; }
  .slide-preview-card.fundo-preto  { background: #000000; color: #FFFFFF; }
  .slide-preview-card.fundo-laranja { background: #C84B1A; color: #FFFFFF; }
  .slide-preview-card.fundo-foto   { background: linear-gradient(135deg,#2a1505,#7a2d0a); color: #FFFFFF; }
  .slide-preview-num  { font-family: monospace; font-size: 10px; opacity: 0.5; }
  .slide-preview-tipo { font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.7; }
  .slide-preview-texto { font-size: 11px; line-height: 1.5; }

  /* ─── PROMPT BOX (fase 3) ─── */
  .prompt-box {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(200,75,26,0.4);
    border-radius: 12px;
    padding: 20px;
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.8;
    color: var(--white);
    white-space: pre-wrap;
    margin-bottom: 16px;
    user-select: all;
  }

  .steps-guide {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin: 24px 0;
  }
  .step-item {
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }
  .step-num {
    width: 28px; height: 28px;
    background: var(--orange);
    color: white;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    flex-shrink: 0;
  }
  .step-text { font-size: 13px; color: var(--white); padding-top: 4px; line-height: 1.5; }
  .step-text strong { color: var(--orange); }

  /* ─── PASTE AREA (fase 4) ─── */
  #pasteArea {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--white);
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 1.7;
    padding: 16px 18px;
    min-height: 220px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #pasteArea:focus {
    border-color: var(--orange);
    box-shadow: 0 0 0 3px rgba(200,75,26,0.12);
  }
  #pasteArea::placeholder { color: rgba(245,245,240,0.2); }

  /* ─── CANVA LINK INPUT (fase 7) ─── */
  #canvaLinkInput {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--white);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 14px 18px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    margin-bottom: 12px;
  }
  #canvaLinkInput:focus {
    border-color: var(--orange);
    box-shadow: 0 0 0 3px rgba(200,75,26,0.12);
  }
  #canvaLinkInput::placeholder { color: rgba(245,245,240,0.2); }
</style>
</head>
<body>

<div class="app">

  <!-- ─── SIDEBAR ─── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="brand-tag">Pipeline v2.0</div>
      <div class="sidebar-title">Fábrica de<br>Carrosseis</div>
      <div class="sidebar-sub">@suellenwarmling · Automático via Claude API</div>
    </div>

    <nav class="phases-nav" id="phasesNav">
      <!-- injected by JS -->
    </nav>

    <div class="sidebar-footer">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:14%"></div>
      </div>
      <div class="progress-text" id="progressText">FASE 1 DE 7</div>
    </div>
  </aside>

  <!-- ─── MAIN ─── -->
  <main class="main">
    <div class="topbar">
      <div class="phase-badge">
        <div class="phase-badge-dot"></div>
        <span id="topbarLabel">Fase 1 — Tema</span>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-ghost" onclick="prevPhase()" id="btnPrev">← Voltar</button>
        <button class="btn btn-primary" onclick="nextPhase()" id="btnNext">Avançar →</button>
      </div>
    </div>

    <div class="content" id="mainContent">
      <!-- injected by JS -->
    </div>
  </main>

</div>

<script>
// ─── STATE ───
const state = {
  currentPhase: 1,
  tema: '',
  nicho: '',
  objetivo: '',
  gancho: '',
  ganchoInput: '',
  extensao: '',
  voz: '',
  textoAprovado: false,
  modelo: '',
  carrosselGerado: '',
  legendaGerada: '',
  canvaLink: '',
  modeloDesignId: '',
  slidesData: [],
  slidesEditaveis: [],
  linkConfirmado: false,
  gerando: false,
  erroGeracao: '',
};

// ─── PHASES ───
const phases = [
  { num: 1, name: 'Tema & Gancho',      desc: 'Escolha ou sugira o tema' },
  { num: 2, name: 'Extensão & Voz',     desc: 'Configure o carrossel' },
  { num: 3, name: 'Geração Automática',  desc: 'Claude API gera o texto' },
  { num: 4, name: 'Revisar Texto',       desc: 'Edite e aprove os slides' },
  { num: 5, name: 'Modelo Canva',       desc: 'Selecione o template visual' },
  { num: 6, name: 'Montagem Canva',     desc: 'Comando de montagem via MCP' },
  { num: 7, name: 'Entrega',            desc: 'Link Canva + legenda pronta' },
];

// ─── RENDER SIDEBAR ───
function renderSidebar() {
  const nav = document.getElementById('phasesNav');
  nav.innerHTML = phases.map((p, i) => {
    const status = p.num < state.currentPhase ? 'completed' : p.num === state.currentPhase ? 'active' : '';
    return `
      ${i > 0 ? '<div class="phase-connector"></div>' : ''}
      <div class="phase-item ${status}" onclick="goToPhase(${p.num})">
        <div class="phase-num">${p.num < state.currentPhase ? '✓' : p.num}</div>
        <div class="phase-info">
          <div class="phase-name">${p.name}</div>
          <div class="phase-desc">${p.desc}</div>
        </div>
      </div>
    `;
  }).join('');

  const pct = Math.round((state.currentPhase / phases.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `FASE ${state.currentPhase} DE ${phases.length}`;
  document.getElementById('topbarLabel').textContent = `Fase ${state.currentPhase} — ${phases[state.currentPhase-1].name}`;

  document.getElementById('btnPrev').style.display = state.currentPhase === 1 ? 'none' : '';
  document.getElementById('btnNext').textContent = state.currentPhase === 7 ? '✓ Concluir' : 'Avançar →';
}

// ─── PHASE CONTENT ───
function renderPhase() {
  const content = document.getElementById('mainContent');
  content.innerHTML = '';

  const phase = state.currentPhase;
  let html = '<div class="phase-content">';

  // ─── FASE 1 ───
  if (phase === 1) {
    html += `
      <div class="phase-header">
        <div class="phase-eyebrow">Fase 01 — Diagnóstico de Tema</div>
        <h1 class="phase-title">O que vai <em>viralizar</em><br>agora?</h1>
        <p class="phase-subtitle">Escolha um tema quente ou deixe o sistema sugerir com base no que está performando no perfil.</p>
      </div>

      <div class="form-group">
        <label>Você tem um tema em mente?</label>
        <div class="choice-grid cols-2">
          <div class="choice-card ${state.tema === 'sim' ? 'selected' : ''}" onclick="select('tema','sim',this)">
            <div class="choice-check">${state.tema === 'sim' ? '✓' : ''}</div>
            <div class="choice-icon">💡</div>
            <div class="choice-title">Sim, tenho um tema</div>
            <div class="choice-desc">Evento real, polêmica ou situação concreta em mente</div>
          </div>
          <div class="choice-card ${state.tema === 'nao' ? 'selected' : ''}" onclick="select('tema','nao',this)">
            <div class="choice-check">${state.tema === 'nao' ? '✓' : ''}</div>
            <div class="choice-icon">🎯</div>
            <div class="choice-title">Sugira para mim</div>
            <div class="choice-desc">O sistema analisa o que tem maior chance de viralizar</div>
          </div>
        </div>
      </div>

      ${state.tema === 'sim' ? `
      <div class="form-group">
        <label>Qual é o tema / evento / polêmica?</label>
        <textarea class="textarea" id="temaInput" placeholder="Ex: A festa de 15 anos luxuosa de uma família de empresários que viralizou no Instagram..." oninput="state.ganchoInput=this.value">${state.ganchoInput||''}</textarea>
      </div>
      <div class="form-group">
        <label>Nicho ou tipo de negócio</label>
        <input class="input" id="nichoInput" placeholder="Ex: Lojas de roupas, salões de beleza, profissionais de saúde..." value="${state.nicho}" oninput="state.nicho=this.value">
      </div>
      ` : ''}

      ${state.tema === 'nao' ? `
      <div class="form-group">
        <label>Nicho ou tipo de negócio</label>
        <input class="input" id="nichoInput" placeholder="Ex: Lojas de roupas, confeitaria, clínica estética..." value="${state.nicho}" oninput="state.nicho=this.value">
      </div>
      <div class="form-group">
        <label>Objetivo principal do carrossel</label>
        <div class="choice-grid">
          ${[
            ['viralizar','🔥','Viralizar fora da base','Atingir pessoas que ainda não me seguem'],
            ['comentarios','💬','Gerar comentários e debate','Alto ratio, polarização controlada'],
            ['salvamentos','🔖','Gerar salvamentos','Conteúdo de referência e autoridade'],
            ['vendas','💰','Gerar DMs e vendas','CTA com palavra-código para automação'],
            ['autoridade','👑','Construir autoridade','Posicionamento no nicho'],
          ].map(([val, icon, title, desc]) => `
            <div class="choice-card ${state.objetivo===val?'selected':''}" onclick="select('objetivo','${val}',this)">
              <div class="choice-check">${state.objetivo===val?'✓':''}</div>
              <div class="choice-icon">${icon}</div>
              <div class="choice-title">${title}</div>
              <div class="choice-desc">${desc}</div>
            </div>
          `).join('')}
        </div>
      </div>
      ` : ''}
    `;
  }

  // ─── FASE 2 ───
  else if (phase === 2) {
    html += `
      <div class="phase-header">
        <div class="phase-eyebrow">Fase 02 — Configuração</div>
        <h1 class="phase-title">Como <em>configurar</em><br>o carrossel?</h1>
        <p class="phase-subtitle">Defina extensão e voz para o agente gerar o texto certo.</p>
      </div>

      <div class="form-group">
        <label>Extensão do carrossel</label>
        <div class="choice-grid cols-2">
          <div class="choice-card ${state.extensao==='10'?'selected':''}" onclick="select('extensao','10',this)">
            <div class="choice-check">${state.extensao==='10'?'✓':''}</div>
            <div class="choice-icon">⚡</div>
            <div class="choice-title">Até 10 slides</div>
            <div class="choice-desc">Mais direto, maior taxa de conclusão de leitura</div>
          </div>
          <div class="choice-card ${state.extensao==='20'?'selected':''}" onclick="select('extensao','20',this)">
            <div class="choice-check">${state.extensao==='20'?'✓':''}</div>
            <div class="choice-icon">📖</div>
            <div class="choice-title">Até 20 slides</div>
            <div class="choice-desc">Mais completo, gera mais saves e autoridade</div>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label>Voz do perfil</label>
        <div class="choice-grid cols-2">
          <div class="choice-card ${state.voz==='pessoa'?'selected':''}" onclick="select('voz','pessoa',this)">
            <div class="choice-check">${state.voz==='pessoa'?'✓':''}</div>
            <div class="choice-icon">🙋‍♀️</div>
            <div class="choice-title">Pessoa (1ª pessoa)</div>
            <div class="choice-desc">"Eu aprendi", "eu descobri", conexão pessoal</div>
          </div>
          <div class="choice-card ${state.voz==='marca'?'selected':''}" onclick="select('voz','marca',this)">
            <div class="choice-check">${state.voz==='marca'?'✓':''}</div>
            <div class="choice-icon">🏢</div>
            <div class="choice-title">Marca / Empresa</div>
            <div class="choice-desc">"A gente", perspectiva institucional</div>
          </div>
        </div>
      </div>

      <div class="divider"></div>
      <p style="font-size:13px;color:var(--muted);">Na próxima fase o sistema vai <strong style="color:var(--orange)">gerar automaticamente</strong> o texto completo via Claude API — sem precisar copiar ou colar nada.</p>
    `;
  }

  // ─── FASE 3 — GERAÇÃO AUTOMÁTICA ───
  else if (phase === 3) {
    const temSlides = state.slidesData && state.slidesData.length > 0;

    if (temSlides) {
      // Já gerado — vai para fase 4
      state.currentPhase = 4;
      renderAll();
      return;
    }

    html += `
      <div class="phase-header">
        <div class="phase-eyebrow">Fase 03 — Geração Automática</div>
        <h1 class="phase-title">Criando seu<br><em>carrossel com IA</em></h1>
        <p class="phase-subtitle">O agente Fábrica de Carrosseis analisa o tema e gera o texto completo automaticamente.</p>
      </div>

      <div id="geracaoStatus">
        ${state.gerando ? `
        <div style="display:flex;flex-direction:column;align-items:center;gap:20px;padding:48px 0">
          <div class="spinner"></div>
          <div style="font-size:14px;color:var(--orange);font-family:var(--font-mono)">Gerando carrossel...</div>
          <div style="font-size:12px;color:var(--muted);text-align:center;max-width:320px">O agente está criando os slides com base no tema e fórmula viral validada</div>
        </div>
        ` : state.erroGeracao ? `
        <div style="background:rgba(200,75,26,0.12);border:1px solid rgba(200,75,26,0.4);border-radius:12px;padding:20px;margin-bottom:24px">
          <div style="font-weight:600;margin-bottom:8px">Erro na geração</div>
          <div style="font-size:13px;color:var(--muted)">${escapeHtml(state.erroGeracao)}</div>
        </div>
        <button class="btn btn-primary" style="width:100%;padding:13px;font-size:14px" onclick="gerarCarrossel()">
          Tentar novamente
        </button>
        ` : `
        <div class="checkpoint" style="margin-bottom:28px">
          <div class="checkpoint-icon">🤖</div>
          <div>
            <div class="checkpoint-title">Pronto para gerar</div>
            <div class="checkpoint-desc">Tema: <strong>${escapeHtml(state.ganchoInput || state.nicho || 'automático')}</strong> · Nicho: <strong>${escapeHtml(state.nicho || 'negócios')}</strong> · ${escapeHtml(state.extensao || '10')} slides · Voz: <strong>${state.voz === 'marca' ? 'Marca' : 'Pessoa'}</strong></div>
          </div>
        </div>
        <button class="btn btn-primary" style="width:100%;padding:16px;font-size:15px;letter-spacing:0.03em" onclick="gerarCarrossel()">
          ⚡ Gerar carrossel agora
        </button>
        `}
      </div>
    `;

    // Auto-iniciar geração se ainda não começou
    if (!state.gerando && !state.erroGeracao && !temSlides) {
      setTimeout(() => gerarCarrossel(), 200);
    }
  }

  // ─── FASE 4 — EDITOR DE TEXTO (colar do agente) ───
  else if (phase === 4) {
    const temSlides = state.slidesData && state.slidesData.length > 0;
    html += `
      <div class="phase-header">
        <div class="phase-eyebrow">Fase 04 — Cole o Texto Gerado</div>
        <h1 class="phase-title">Cole o texto<br><em>gerado pelo agente</em></h1>
        <p class="phase-subtitle">Copie o texto dos slides que o Claude Code gerou e cole abaixo.</p>
      </div>

      ${!temSlides ? `
      <div class="checkpoint">
        <div class="checkpoint-icon">📋</div>
        <div>
          <div class="checkpoint-title">Cole o texto do pipeline-carrossel-suellen</div>
          <div class="checkpoint-desc">O texto deve ter os slides separados por <strong>---</strong> e cada bloco com uma linha <strong>Visual:</strong> indicando o fundo.</div>
        </div>
      </div>

      <div class="form-group">
        <label>Texto gerado pelo agente</label>
        <textarea id="pasteArea" placeholder="Cole aqui o texto dos slides gerado pelo pipeline-carrossel-suellen...">${state.carrosselGerado || ''}</textarea>
      </div>

      <button class="btn btn-primary" style="width:100%;padding:13px;font-size:14px" onclick="parsearSlidesColados()">
        Analisar slides colados →
      </button>
      ` : `
      <div class="checkpoint">
        <div class="checkpoint-icon">✏️</div>
        <div>
          <div class="checkpoint-title">Edição inline habilitada</div>
          <div class="checkpoint-desc">Clique em qualquer slide abaixo para editar o texto diretamente. As alterações são salvas em tempo real.</div>
        </div>
      </div>

      <div id="slidesEditor" style="display:flex;flex-direction:column;gap:10px;margin-bottom:24px">
        ${buildSlidesEditor()}
      </div>

      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px">
        <button class="btn btn-primary" style="padding:12px 28px;font-size:14px" onclick="aprovarTexto()">
          ✅ Aprovar e selecionar modelo →
        </button>
        <button class="btn btn-ghost" style="font-size:13px" onclick="salvarEdicoes()">
          💾 Salvar edições
        </button>
        <span id="savedMsg" style="font-size:12px;color:var(--orange);opacity:0;transition:opacity 0.3s">Salvo!</span>
      </div>

      <button class="btn btn-ghost" style="font-size:12px" onclick="resetarSlides()">
        ← Colar novo texto
      </button>
      `}
    `;
  }

  // ─── FASE 5 — SELEÇÃO DE MODELO ───
  else if (phase === 5) {
    html += `
      <div class="phase-header">
        <div class="phase-eyebrow">Fase 05 — Seleção de Modelo</div>
        <h1 class="phase-title">Qual <em>template</em><br>visual usar?</h1>
        <p class="phase-subtitle">Cada modelo tem uma estrutura visual e propósito diferente. O sistema recomenda baseado na fórmula escolhida.</p>
      </div>

      <div class="model-grid">

        <div class="model-card ${state.modelo==='1'?'selected':''}" onclick="selectModel('1')">
          <div class="model-preview m1-preview">
            <div class="m1-p1">SUELLEN WARMLING</div>
            <div class="m1-p2">"Ok, aguardo<br>seu retorno"</div>
            <div class="m1-p3"><span>OPÇÃO 1 →</span></div>
          </div>
          <div class="model-info">
            <div class="model-name">Modelo 1</div>
            <div class="model-slides">9 SLIDES</div>
            <div class="model-desc">Objeção → Scripts numerados → CTA produto. Sem imagem externa.</div>
          </div>
        </div>

        <div class="model-card ${state.modelo==='2'?'selected':''}" onclick="selectModel('2')">
          <div class="model-preview m2-preview">
            <div class="m2-overlay">
              <div class="m2-text">Ivete não sobe no trio pensando em quem <strong>não gosta</strong> de Carnaval...</div>
            </div>
          </div>
          <div class="model-info">
            <div class="model-name">Modelo 2</div>
            <div class="model-slides">10 SLIDES</div>
            <div class="model-desc">Analogias com famosos → Lição → CTA. Requer 6 imagens de busca.</div>
          </div>
        </div>

        <div class="model-card ${state.modelo==='3'?'selected':''}" onclick="selectModel('3')">
          <div class="model-preview m3-preview">
            <div class="m3-img-slot">📸 print real</div>
            <div class="m3-text-slot">Caso real com prints reais do WhatsApp ou stories...</div>
          </div>
          <div class="model-info">
            <div class="model-name">Modelo 3</div>
            <div class="model-slides">13 SLIDES</div>
            <div class="model-desc">Caso real → Prints → Solução → CTA. Requer prints do cliente.</div>
          </div>
        </div>

      </div>

      ${state.modelo ? `
      <div style="margin-top:20px">
        ${state.modelo === '1' ? '<div class="tag tag-orange">✓ Sem imagens externas necessárias</div>' : ''}
        ${state.modelo === '2' ? `
          <div class="formula-badge" style="margin-top:0">
            <span class="formula-icon">🖼️</span>
            <div>
              <strong>6 imagens necessárias</strong> — uma por analogia nos slides 1-6
              <div style="font-size:11px;color:var(--muted);margin-top:2px;">O sistema vai buscar automaticamente via web após você definir os famosos/marcas</div>
            </div>
          </div>
        ` : ''}
        ${state.modelo === '3' ? `
          <div class="formula-badge" style="margin-top:0">
            <span class="formula-icon">📱</span>
            <div>
              <strong>Prints reais necessários</strong> — slides 2-8 requerem imagens do caso
              <div style="font-size:11px;color:var(--muted);margin-top:2px;">Você pode fornecer prints ou o sistema buscará imagens ilustrativas</div>
            </div>
          </div>
        ` : ''}
      </div>
      ` : ''}
    `;
  }

  // ─── FASE 6 — MONTAGEM CANVA LAUNCHER ───
  else if (phase === 6) {
    const modelNum = state.modelo || '?';
    const modelId = state.modeloDesignId || 'selecione um modelo';
    const comandoMontagem = gerarComandoMontagem();
    html += `
      <div class="phase-header">
        <div class="phase-eyebrow">Fase 06 — Montagem no Canva</div>
        <h1 class="phase-title">Monte no <em>Canva</em><br>via Claude Code</h1>
        <p class="phase-subtitle">Copie o comando abaixo e cole no Claude Code. O agente vai usar start-editing-transaction + perform-editing-operations + commit para montar todos os slides no Canva.</p>
      </div>

      <div class="form-group">
        <label>Template selecionado</label>
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:4px">
          <div class="tag tag-orange">MODELO ${modelNum} — ${modelId}</div>
          <div class="tag tag-muted">NUNCA editar template original</div>
        </div>
      </div>

      <div class="generated-box" style="margin-bottom:16px">
        <div class="generated-header">
          <div class="generated-label">Comando de montagem</div>
          <button class="copy-btn" onclick="copiarComandoMontagem()">COPIAR</button>
        </div>
        <div class="generated-content" style="font-family:var(--font-mono);font-size:13px">${escapeHtml(comandoMontagem)}</div>
      </div>

      <div class="steps-guide" style="margin-bottom:28px">
        <div class="step-item">
          <div class="step-num">1</div>
          <div class="step-text">Copie o comando acima clicando em <strong>COPIAR</strong></div>
        </div>
        <div class="step-item">
          <div class="step-num">2</div>
          <div class="step-text">Cole no <strong>Claude Code</strong> e envie</div>
        </div>
        <div class="step-item">
          <div class="step-num">3</div>
          <div class="step-text">O agente vai usar <strong>start-editing-transaction → perform-editing-operations → commit</strong> automaticamente</div>
        </div>
      </div>

      <div class="divider"></div>

      <button class="btn btn-primary" style="width:100%;padding:13px;font-size:14px" onclick="goToPhase(7)">
        Montagem concluída — ver resultado →
      </button>
    `;
  }

  // ─── FASE 7 — ENTREGA ───
  else if (phase === 7) {
    const modelNum = state.modelo || '1';
    html += `
      <div class="phase-header">
        <div class="phase-eyebrow">Fase 07 — Entrega</div>
        <h1 class="phase-title">Carrossel<br><em>montado no Canva!</em></h1>
        <p class="phase-subtitle">Cole o link do Canva retornado pelo Claude Code para finalizar.</p>
      </div>

      ${!state.linkConfirmado ? `
      <div class="form-group">
        <label>Link do Canva retornado pelo Claude Code</label>
        <input id="canvaLinkInput" placeholder="Cole aqui o link do Canva retornado pelo Claude Code..." oninput="state.canvaLink=this.value" value="${escapeHtml(state.canvaLink)}">
        <button class="btn btn-primary" style="width:100%;padding:12px;font-size:14px;margin-top:8px" onclick="confirmarLink()">
          Confirmar link
        </button>
      </div>
      ` : `
      <!-- CANVA LINK -->
      <div class="delivery-card">
        <div class="delivery-header">
          <div class="delivery-icon">🎨</div>
          <div class="delivery-title">Design montado no Canva — Modelo ${modelNum}</div>
        </div>
        <div class="delivery-body">
          <a class="canva-link" href="${escapeHtml(state.canvaLink)}" target="_blank">
            <div class="canva-link-icon">🔗</div>
            <div class="canva-link-text">
              <div class="canva-link-label">Abrir no Canva para exportar</div>
              <div class="canva-link-url">${escapeHtml(state.canvaLink)}</div>
            </div>
            <div class="canva-link-arrow">↗</div>
          </a>
          <p style="font-size:12px;color:var(--muted)">No Canva: <strong>Compartilhar → Baixar → PNG → Todas as páginas → Baixar</strong></p>
        </div>
      </div>
      `}

      <!-- PREVIEW VISUAL DOS SLIDES -->
      ${buildSlidesPreviewGrid()}

      ${state.slidesData && state.slidesData.length > 0 ? `
      <!-- TEXTO DOS SLIDES -->
      <div class="generated-box" style="margin-bottom:16px">
        <div class="generated-header">
          <div class="generated-label">Texto completo dos slides</div>
          <button class="copy-btn" onclick="copyCarrossel()">COPIAR TUDO</button>
        </div>
        <div class="generated-content" id="carrosselFinal">${escapeHtml(getTextoFinalSlides())}</div>
      </div>

      <!-- LEGENDA -->
      <div class="generated-box" style="margin-bottom:24px">
        <div class="generated-header">
          <div class="generated-label">Legenda gerada</div>
          <button class="copy-btn" onclick="copyLegenda()">COPIAR</button>
        </div>
        <div class="generated-content" id="legendaFinal">${escapeHtml(getLegenda())}</div>
      </div>
      ` : ''}

      <div style="background:var(--orange-pale);border:1px solid rgba(200,75,26,0.25);border-radius:10px;padding:18px 20px">
        <p style="font-size:13px;font-weight:600;margin-bottom:6px">📌 Após postar</p>
        <p style="font-size:12px;color:var(--muted)">Avise o agente que postou para ele <strong>redefinir o template de trabalho</strong> e deixar pronto para o próximo carrossel.</p>
        <div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">
          <button class="btn btn-primary" style="font-size:12px;padding:8px 18px" onclick="reiniciar()">+ Novo carrossel</button>
          <button class="btn btn-ghost" style="font-size:12px" onclick="copiarComandoRedefinir()">Copiar comando: Redefinir template ${modelNum}</button>
        </div>
      </div>
    `;
  }

  html += '</div>';
  content.innerHTML = html;
}

// ─── HELPERS ───
function select(key, val, el) {
  state[key] = val;
  renderPhase();
  renderSidebar();
}

function selectModel(num) {
  state.modelo = num;
  const ids = { '1': 'DAHE5MATRwk', '2': 'DAHE5Fele2U', '3': 'DAHE5Owuqkk' };
  state.modeloDesignId = ids[num];
  renderPhase();
  renderSidebar();
}

function goToPhase(num) {
  if (num <= state.currentPhase || num === state.currentPhase + 1) {
    state.currentPhase = num;
    renderAll();
  }
}

function nextPhase() {
  if (state.currentPhase < phases.length) {
    state.currentPhase++;
    renderAll();
    document.querySelector('.content').scrollTop = 0;
    window.scrollTo(0,0);
  }
}

function prevPhase() {
  if (state.currentPhase > 1) {
    state.currentPhase--;
    renderAll();
    window.scrollTo(0,0);
  }
}

function renderAll() {
  renderSidebar();
  renderPhase();
}

function escapeHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ─── GERAR CARROSSEL VIA CLAUDE API ───
async function gerarCarrossel() {
  state.gerando = true;
  state.erroGeracao = '';
  renderPhase();

  try {
    const payload = {
      tema: state.ganchoInput && state.ganchoInput.trim() ? state.ganchoInput.trim() : '',
      nicho: state.nicho || 'negócios locais',
      objetivo: state.objetivo || 'viralizar',
      extensao: state.extensao || '10',
      voz: state.voz || 'pessoa',
    };

    const resp = await fetch('/api/gerar-carrossel', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });

    const data = await resp.json();

    if (!resp.ok || data.error) {
      throw new Error(data.error || `HTTP ${resp.status}`);
    }

    // Preencher state com os slides retornados
    state.slidesData = data.slides || [];
    state.slidesEditaveis = state.slidesData.map(s => ({
      id: s.id,
      texto: s.texto,
      fundo: s.fundo,
      tipo: s.tipo,
    }));
    state.legendaGerada = data.legenda || '';
    state.carrosselGerado = data.textoCompleto || '';
    state.gerando = false;

    // Avançar automaticamente para fase 4
    state.currentPhase = 4;
    renderAll();

  } catch (err) {
    state.gerando = false;
    state.erroGeracao = err.message || 'Erro desconhecido';
    renderPhase();
  }
}

// ─── PARSEAR SLIDES COLADOS (fase 4) ───
function parsearSlidesColados() {
  const textarea = document.getElementById('pasteArea');
  if (!textarea) return;
  const texto = textarea.value;
  if (!texto.trim()) {
    alert('Cole o texto gerado pelo agente antes de analisar.');
    return;
  }

  state.carrosselGerado = texto;

  // Dividir por ---
  const blocos = texto.split(/\n---\n/).filter(b => b.trim());

  state.slidesData = blocos.map((bloco, i) => {
    const linhas = bloco.split('\n');
    const titulo = linhas[0].replace(/^---\s*/, '').trim();

    // Detectar fundo pela linha "Visual:"
    const visualLine = linhas.find(l => l.toLowerCase().includes('visual:')) || '';
    let fundo = 'branco';
    if (visualLine.toLowerCase().includes('laranja') || visualLine.toLowerCase().includes('#c84b1a')) fundo = 'laranja';
    else if (visualLine.toLowerCase().includes('preto') || visualLine.toLowerCase().includes('#000')) fundo = 'preto';
    else if (visualLine.toLowerCase().includes('foto') || visualLine.toLowerCase().includes('suellen')) fundo = 'foto';

    // Detectar tipo pelo título
    let tipo = 'slide';
    const tituloLower = titulo.toLowerCase();
    if (tituloLower.includes('gancho')) tipo = 'gancho';
    else if (tituloLower.includes('cta')) tipo = 'cta';
    else if (tituloLower.includes('polariza') || tituloLower.includes('print')) tipo = 'polarização';
    else if (tituloLower.includes('lição') || tituloLower.includes('licao')) tipo = 'lição';
    else if (tituloLower.includes('autoridade')) tipo = 'autoridade';
    else if (tituloLower.includes('virada')) tipo = 'virada';
    else if (tituloLower.includes('produto')) tipo = 'produto';

    // Texto sem a linha Visual: e sem o título
    const textoSlide = linhas.filter((l, idx) => idx > 0 && !l.toLowerCase().startsWith('visual:')).join('\n').trim();

    return { id: i, tipo, fundo, titulo, texto: bloco.trim(), textoSlide };
  });

  state.slidesEditaveis = state.slidesData.map(s => ({ id: s.id, texto: s.texto, fundo: s.fundo, tipo: s.tipo }));

  // Gerar legenda a partir do CTA/último slide
  state.legendaGerada = extrairLegenda();

  renderPhase();
}

// ─── EXTRAIR LEGENDA DOS SLIDES ───
function extrairLegenda() {
  if (!state.slidesData || state.slidesData.length === 0) return '';
  // Procurar slide CTA
  const ctaSlide = state.slidesData.find(s => s.tipo === 'cta');
  const baseSlide = ctaSlide || state.slidesData[state.slidesData.length - 1];
  const texto = baseSlide ? baseSlide.textoSlide || baseSlide.texto : '';
  // Retornar o texto do slide CTA como base da legenda
  const nicho = state.nicho || 'negócios';
  const tags = `\n\n#empreendedorismo #negocioslocais #${nicho.replace(/\s+/g,'').toLowerCase()} #vendas #suellenwarmling #marketingdigital`;
  return (texto || '') + tags;
}

// ─── RESETAR SLIDES ───
function resetarSlides() {
  state.slidesData = [];
  state.slidesEditaveis = [];
  renderPhase();
}

// ─── GERAR COMANDO MONTAGEM (fase 6) ───
function gerarComandoMontagem() {
  const modelNum = state.modelo || '?';
  const modelId = state.modeloDesignId || 'ID não selecionado';
  return `Monte no Canva o carrossel aprovado usando o template Modelo ${modelNum}.
Modelo selecionado: ${modelId}`;
}

// ─── COPIAR COMANDO MONTAGEM ───
function copiarComandoMontagem() {
  const cmd = gerarComandoMontagem();
  navigator.clipboard.writeText(cmd).then(() => {
    const btn = event.target;
    const orig = btn.textContent;
    btn.textContent = 'COPIADO!';
    setTimeout(() => { btn.textContent = orig; }, 2000);
  });
}

// ─── CONFIRMAR LINK CANVA (fase 7) ───
function confirmarLink() {
  if (!state.canvaLink || !state.canvaLink.trim()) {
    alert('Cole o link do Canva antes de confirmar.');
    return;
  }
  state.linkConfirmado = true;
  renderPhase();
}

// ─── SLIDE EDITOR ───
function buildSlidesEditor() {
  if (!state.slidesEditaveis || state.slidesEditaveis.length === 0) {
    if (state.slidesData && state.slidesData.length > 0) {
      state.slidesEditaveis = state.slidesData.map((s, i) => ({
        id: i,
        texto: s.texto,
        fundo: s.fundo,
        tipo: s.tipo,
      }));
    } else {
      return '<p style="color:var(--muted);font-size:13px">Nenhum slide encontrado.</p>';
    }
  }

  const headerBg = {
    branco:  'background: rgba(255,255,255,0.06)',
    preto:   'background: #000',
    laranja: 'background: rgba(200,75,26,0.3)',
    foto:    'background: linear-gradient(135deg,rgba(200,75,26,0.3),rgba(0,0,0,0.3))',
  };

  return state.slidesEditaveis.map((slide, i) => {
    const linhas = (slide.texto || '').split('\n');
    const titulo = linhas[0].replace(/^---\s*/, '').trim();
    const bg = headerBg[slide.fundo] || headerBg.branco;

    return `
      <div class="slide-edit-card" id="slide-card-${i}">
        <div class="slide-edit-header" style="${bg}">
          <span class="slide-edit-num">${String(i+1).padStart(2,'0')}</span>
          <span class="slide-edit-title">${escapeHtml(titulo)}</span>
        </div>
        <textarea
          class="slide-edit-textarea"
          id="slide-textarea-${i}"
          rows="5"
          oninput="state.slidesEditaveis[${i}].texto=this.value"
        >${escapeHtml(slide.texto)}</textarea>
      </div>`;
  }).join('');
}

function salvarEdicoes() {
  if (state.slidesEditaveis) {
    state.slidesEditaveis.forEach((slide, i) => {
      const el = document.getElementById('slide-textarea-' + i);
      if (el) slide.texto = el.value;
    });
    state.carrosselGerado = state.slidesEditaveis.map(s => s.texto).join('\n---\n');
  }
  const msg = document.getElementById('savedMsg');
  if (msg) {
    msg.style.opacity = '1';
    setTimeout(() => { msg.style.opacity = '0'; }, 2200);
  }
}

function aprovarTexto() {
  salvarEdicoes();
  state.textoAprovado = true;
  nextPhase();
}

// ─── COPY FUNCTIONS ───
function copyCarrossel() {
  const texto = getTextoFinalSlides();
  navigator.clipboard.writeText(texto).then(() => {
    const btn = event.target;
    btn.textContent = 'COPIADO!';
    btn.style.background = 'var(--orange)';
    btn.style.color = 'white';
    setTimeout(() => {
      btn.textContent = 'COPIAR TUDO';
      btn.style.background = '';
      btn.style.color = '';
    }, 2000);
  });
}

function copyLegenda() {
  navigator.clipboard.writeText(getLegenda()).then(() => {
    const btn = event.target;
    btn.textContent = 'COPIADO!';
    setTimeout(() => btn.textContent = 'COPIAR', 2000);
  });
}

function getTextoFinalSlides() {
  if (state.slidesEditaveis && state.slidesEditaveis.length > 0) {
    return state.slidesEditaveis.map(s => s.texto).join('\n\n---\n\n');
  }
  return state.carrosselGerado || '';
}

function getLegenda() {
  return state.legendaGerada || extrairLegenda();
}

// ─── SLIDES PREVIEW GRID ───
function buildSlidesPreviewGrid() {
  const slides = state.slidesData && state.slidesData.length > 0
    ? state.slidesData
    : (state.slidesEditaveis || []).map(s => ({ tipo: s.tipo || '', fundo: s.fundo || 'branco', texto: s.texto || '' }));

  if (!slides.length) return '';

  const cards = slides.map((s, i) => {
    const num = String(i + 1).padStart(2, '0');
    const tipoLabel = (s.tipo || '').toUpperCase().replace(/\d/g, '');
    const textoPreview = (s.textoSlide || s.texto || '').replace(/\n/g, ' ').slice(0, 80) + ((s.texto || '').length > 80 ? '…' : '');
    return `
      <div class="slide-preview-card fundo-${s.fundo || 'branco'}">
        <div class="slide-preview-num">${num}</div>
        <div class="slide-preview-tipo">${escapeHtml(tipoLabel)}</div>
        <div class="slide-preview-texto">${escapeHtml(textoPreview)}</div>
      </div>`;
  }).join('');

  return `
    <div style="margin-bottom:24px">
      <p style="font-family:var(--font-mono);font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--orange);margin-bottom:14px;">Prévia visual dos slides</p>
      <div class="slides-preview-grid">${cards}</div>
    </div>`;
}

// ─── REINICIAR ───
function reiniciar() {
  Object.assign(state, {
    currentPhase: 1, tema: '', nicho: '', objetivo: '', gancho: '',
    ganchoInput: '', extensao: '', voz: '', textoAprovado: false,
    modelo: '', carrosselGerado: '', legendaGerada: '', canvaLink: '', modeloDesignId: '',
    slidesData: [], slidesEditaveis: [], linkConfirmado: false,
    gerando: false, erroGeracao: '',
  });
  renderAll();
  window.scrollTo(0,0);
}

function copiarComandoRedefinir() {
  const modelo = state.modelo || '1';
  const cmd = `Redefinir template ${modelo}`;
  navigator.clipboard.writeText(cmd).then(() => {
    const btn = event.target;
    const orig = btn.textContent;
    btn.textContent = 'COPIADO!';
    setTimeout(() => { btn.textContent = orig; }, 2000);
  });
}

// ─── INIT ───
renderAll();
</script>
